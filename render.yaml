# render.yaml — Deploy no Render.com (gratuito)
# Documentação: https://render.com/docs/blueprint-spec

services:
  # ── Backend ──────────────────────────────────────────────
  - type: web
    name: crm-pro-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true          # Render gera automaticamente
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://crm-pro-frontend.onrender.com  # Ajuste para sua URL
      - key: ADMIN_EMAIL
        value: admin@suaempresa.com
      - key: ADMIN_PASSWORD
        value: Troque@123456          # MUDE antes do deploy!
      - key: ADMIN_NAME
        value: Administrador
    disk:
      name: crm-db
      mountPath: /opt/render/project/src/backend
      sizeGB: 1

  # ── Frontend (static site) ──────────────────────────────
  - type: web
    name: crm-pro-frontend
    env: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && REACT_APP_API_URL=https://crm-pro-backend.onrender.com/api npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
